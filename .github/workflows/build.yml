name: Pure Native Android Build
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Free Space Checked
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Generate Full Android Project Structure
        run: |
          mkdir -p myapp/app/src/main/java/com/secure/app
          mkdir -p myapp/app/src/main/res/layout
          mkdir -p myapp/app/src/main/res/values

          # Android Manifest configuration with Internet permission
          cat << 'EOF' > myapp/app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android" package="com.secure.app">
              <uses-permission android:name="android.permission.INTERNET" />
              <application android:label="PBTDKA" android:theme="@android:style/Theme.NoTitleBar.Fullscreen">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          # Strings XML file
          echo '<resources><string name="app_name">PBTDKA</string></resources>' > myapp/app/src/main/res/values/strings.xml

          # Layout XML file with a clean Fullscreen WebView
          cat << 'EOF' > myapp/app/src/main/res/layout/activity_main.xml
          <?xml version="1.0" encoding="utf-8"?>
          <RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android" android:layout_width="match_parent" android:layout_height="match_parent">
              <webkit.WebView android:id="@+id/secure_engine" android:layout_width="match_parent" android:layout_height="match_parent" />
          </RelativeLayout>
          EOF

          # Java MainActivity - Hardcoded URL completely hidden from user view
          cat << 'EOF' > myapp/app/src/main/java/com/secure/app/MainActivity.java
          package com.secure.app;
          import android.os.Bundle;
          import android.webkit.WebSettings;
          import android.webkit.WebView;
          import android.webkit.WebViewClient;
          import android.app.Activity;

          public class MainActivity extends Activity {
              private WebView view;
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);
                  view = findViewById(R.id.secure_engine);
                  WebSettings ws = view.getSettings();
                  ws.setJavaScriptEnabled(true);
                  ws.setDomStorageEnabled(true);
                  view.setWebViewClient(new WebViewClient());
                  view.loadUrl("https://pbtdka.vercel.app/");
              }
              @Override
              public void onBackPressed() {
                  if (view.canGoBack()) { view.goBack(); } else { super.onBackPressed(); }
              }
          }
          EOF

          # Root Gradle Setup
          echo "subprojects { repositories { google(); mavenCentral() } }" > myapp/build.gradle
          echo "pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }" > myapp/settings.gradle
          echo "include ':app'" >> myapp/settings.gradle

          # App level Gradle Settings
          cat << 'EOF' > myapp/app/build.gradle
          plugins {
              id 'com.android.application' version '8.1.1'
          }
          android {
              namespace 'com.secure.app'
              compileSdk 34
              defaultConfig {
                  applicationId "com.secure.app"
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
          }
          EOF

          # Download and install specific Gradle wrapper version to prevent build failure
          cd myapp
          gradle wrapper --gradle-version 8.1.1

      - name: Build Pure Release APK
        run: |
          cd myapp
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload Secured APK
        uses: actions/upload-artifact@v4
        with:
          name: PBTDKA-Private-APK
          path: myapp/app/build/outputs/apk/debug/app-debug.apk
