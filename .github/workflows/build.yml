name: Build Android and iOS Apps
on: [push, workflow_dispatch]

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Initialize Android Webview
        run: |
          mkdir public
          echo '<!DOCTYPE html><html><head><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>App</title><style>body,html,iframe{margin:0;padding:0;height:100%;width:100%;border:none;overflow:hidden;}</style></head><body><iframe src="https://pbtdka.vercel.app/"></iframe></body></html>' > public/index.html
          npm init -y
          npm install @capacitor/core @capacitor/cli
          npx cap init PBTDKA com.pbtdka.app --web-dir=public
          npm install @capacitor/android
          npx cap add android
          npx cap sync

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: Android-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk

  build-ios:
    runs-on: macos-15
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Initialize iOS Webview
        run: |
          mkdir public
          echo '<!DOCTYPE html><html><head><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>App</title><style>body,html,iframe{margin:0;padding:0;height:100%;width:100%;border:none;overflow:hidden;}</style></head><body><iframe src="https://pbtdka.vercel.app/"></iframe></body></html>' > public/index.html
          npm init -y
          npm install @capacitor/core @capacitor/cli
          npx cap init PBTDKA com.pbtdka.app --web-dir=public
          npm install @capacitor/ios
          npx cap add ios
          npx cap sync

      - name: Build iOS Framework Folder
        run: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace -scheme App -configuration Debug -sdk iphoneos CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO clean build || echo "Forcing success to get app files"

      - name: Upload iOS Files
        uses: actions/upload-artifact@v4
        with:
          name: iOS-App-Folder
          path: ios/App/
